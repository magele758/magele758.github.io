<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evolution · Agent 自我进化档案</title>
    <meta
      name="description"
      content="从 RSS 与论文中筛选、研究、实现并合并到主仓的自动化进化记录。"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%230a0e14'/%3E%3Cpath stroke='%2300e5c5' stroke-width='1.8' fill='none' d='M9 11h14M9 16h9M9 21h12'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到主内容</a>
    <div class="grid-bg" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <span class="brand-prompt" aria-hidden="true">$</span>
          <h1 class="brand-title">evolution<span class="brand-cursor" aria-hidden="true">_</span></h1>
        </div>
        <p class="tagline">
          Agent 从外部资料中学习并落地到代码库的实验流水与可追溯记录。
        </p>
        <p class="meta-build" id="buildMeta" hidden></p>
      </div>
    </header>

    <main id="main" class="container">
      <section class="panel stats-panel" aria-labelledby="stats-heading">
        <h2 id="stats-heading" class="sr-only">统计</h2>
        <div id="statsStrip" class="stats-strip"></div>
      </section>

      <section class="panel controls-panel" aria-labelledby="controls-heading">
        <h2 id="controls-heading" class="sr-only">筛选与排序</h2>
        <div class="controls-row">
          <fieldset class="filter-fieldset">
            <legend>按状态筛选</legend>
            <div id="statusFilters" class="chip-group" role="group" aria-label="状态"></div>
          </fieldset>
          <div class="search-wrap">
            <label for="q">搜索标题</label>
            <input
              id="q"
              type="search"
              name="q"
              autocomplete="off"
              placeholder="标题关键词…"
            />
          </div>
          <div class="sort-wrap">
            <label for="sort">排序</label>
            <select id="sort" name="sort">
              <option value="date-desc">时间 · 新→旧</option>
              <option value="date-asc">时间 · 旧→新</option>
              <option value="status">状态</option>
            </select>
          </div>
        </div>
      </section>

      <section class="panel list-panel" aria-labelledby="list-heading">
        <h2 id="list-heading" class="sr-only">记录列表</h2>
        <p id="listCount" class="list-count" aria-live="polite"></p>
        <ul id="recordList" class="record-list"></ul>
        <p id="loadError" class="load-error" hidden role="alert"></p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>
          数据由本地/CI 从
          <code>doc/evolution</code>
          生成；原始 Markdown 可能在独立 Agent 仓库中。
        </p>
      </div>
    </footer>

    <script src="app.js" defer></script>
  </body>
</html>
